<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-visual">
        <div class="auth-visual-content">
          <i class="fas fa-globe-americas"></i>
          <h2>Start Your Journey!</h2>
          <p>Join thousands of travelers exploring the world with STravels</p>
        </div>
      </div>

      <div class="auth-form-container">
        <div class="auth-form">
          <h1>Sign Up</h1>
          <p class="auth-subtitle">Create your account</p>

          <div class="alert alert-error" *ngIf="error">
            <i class="fas fa-exclamation-circle"></i>
            {{ error }}
          </div>

          <form (ngSubmit)="onSubmit()">
            <div class="form-group">
              <label class="form-label">First Name</label>
              <input type="text" class="form-control" [(ngModel)]="registerData.firstName" name="firstName" required>
            </div>

            <div class="form-group">
              <label class="form-label">Last Name</label>
              <input type="text" class="form-control" [(ngModel)]="registerData.lastName" name="lastName" required>
            </div>

            <div class="form-group">
              <label class="form-label">Email Address</label>
              <input type="email" class="form-control" [(ngModel)]="registerData.email" name="email" required>
            </div>

            <div class="form-group">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" [(ngModel)]="registerData.password" name="password" required>
            </div>

            <div class="form-group">
              <label class="form-label">Confirm Password</label>
              <input type="password" class="form-control" [(ngModel)]="confirmPassword" name="confirmPassword" required>
            </div>

            <button type="submit" class="btn btn-primary btn-lg" [disabled]="loading" style="width: 100%;">
              <span *ngIf="!loading">Create Account</span>
              <span *ngIf="loading">Creating Account...</span>
            </button>
          </form>

          <p class="auth-footer">
            Already have an account? <a routerLink="/login" class="link">Login</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
